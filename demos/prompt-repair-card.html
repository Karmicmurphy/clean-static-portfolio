<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Prompt Repair Card — Randy AI Field Kit</title><link rel="stylesheet" href="../style.css"/></head><body>
<nav class="nav"><div class="container nav-inner"><a class="brand" href="../index.html">Randy AI Field Kit</a><div class="nav-links"><a href="../index.html#demos">Demos</a><a href="../resume/index.html">Resume</a><a href="mailto:rnoxon78@gmail.com">Contact</a></div></div></nav>
<main class="tool-page"><div class="container"><div class="eyebrow">Demo 2 · Prompt repair</div><h1>Prompt Repair Card</h1><p class="lede">Choose a failure and a repair strength. The tool generates a Direct, Mini, or Full card a user can paste into a failing AI conversation.</p><section class="demo-tool">
<div class="tool-row"><div><label for="failure">Failure type</label><select id="failure"><option value="lost">Lost Constraints</option><option value="certainty">Unsupported Certainty</option><option value="looping">Looping</option><option value="overexplaining">Overexplaining</option><option value="source">Source / Assumption Confusion</option><option value="restart">Restart Behavior</option></select></div><div><label for="mode">Repair strength</label><select id="mode"><option value="direct">Direct</option><option value="mini">Mini</option><option value="full">Full</option></select></div></div>
<label for="constraints">Optional active constraints / facts to preserve</label><textarea id="constraints">Use the user's actual materials and limits. Do not replace the real situation with ideal resources. Give the next practical step.</textarea>
<div class="buttons"><button type="button" class="btn primary" onclick="generate()">Generate repair card</button><button type="button" class="btn" onclick="copyOutput()">Copy card</button></div><div id="output" class="output"></div>
</section></div></main><footer class="footer"><div class="container"><a href="../index.html">Back to portfolio</a></div></footer>
<script>
const failures={lost:'You lost the user’s constraints.',certainty:'You stated uncertain material too confidently.',looping:'You are looping instead of advancing the task.',overexplaining:'You are overexplaining and hiding the useful next step.',source:'You mixed sourced facts with assumptions.',restart:'You restarted instead of continuing from established context.'};
const directives={lost:'Use only the situation and limits already provided. Do not substitute ideal materials, tools, budget, or conditions unless asked.',certainty:'Separate facts, assumptions, and unknowns. Do not present guesses as verified information.',looping:'Do not repeat earlier advice. Identify the current state and give the next concrete step.',overexplaining:'Lead with the answer. Cut background unless it directly changes the action.',source:'Label what came from the user, what is inferred, and what still needs verification.',restart:'Continue from the current state. Preserve prior decisions and do not make the user start over.'};
function generate(){const f=document.getElementById('failure').value;const mode=document.getElementById('mode').value;const c=document.getElementById('constraints').value.trim();let out='';if(mode==='direct'){out=`DIRECT REPAIR CARD\n\n${failures[f]} ${directives[f]}\n\nActive constraints to preserve:\n${c}\n\nTry again with a practical answer that fits the actual request.`}if(mode==='mini'){out=`MINI REPAIR CARD\n\nFailure to correct:\n${failures[f]}\n\nActive constraints / facts:\n${c}\n\nRequired correction:\n${directives[f]}\n\nOutput rule:\nGive the smallest complete answer that moves the task forward.`}if(mode==='full'){out=`FULL REPAIR CARD\n\nYou need to repair the previous response before continuing.\n\n1. Identify the failure:\n${failures[f]}\n\n2. Restore the working state:\n${c}\n\n3. Apply this correction:\n${directives[f]}\n\n4. Do not invent missing facts. If something is unknown, label it as unknown.\n\n5. Give a practical revised answer that preserves the user's real goal, constraints, and current progress.`}document.getElementById('output').textContent=out}
function copyOutput(){const text=document.getElementById('output').textContent||'';if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text);return;}const box=document.createElement('textarea');box.value=text;document.body.appendChild(box);box.select();document.execCommand('copy');box.remove();}
generate();
</script></body></html>
