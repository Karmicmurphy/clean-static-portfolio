<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Artifact Compass Lite — Randy AI Field Kit</title><link rel="stylesheet" href="../style.css"/></head><body>
<nav class="nav"><div class="container nav-inner"><a class="brand" href="../index.html">Randy AI Field Kit</a><div class="nav-links"><a href="../index.html#demos">Demos</a><a href="../resume/index.html">Resume</a><a href="mailto:rnoxon78@gmail.com">Contact</a></div></div></nav>
<main class="tool-page"><div class="container"><div class="eyebrow">Demo 3 · Workflow / provenance</div><h1>Artifact Compass Lite</h1><p class="lede">A small source-governed registry demo. It shows how AI work can track artifacts, status, source boundaries, and relationships without a database or cloud dependency.</p><section class="demo-tool split"><div><label for="filter">Filter artifacts</label><input id="filter" placeholder="Search title, type, status..." oninput="renderList()"/><div id="list" class="artifact-list" style="margin-top:14px"></div></div><div><div id="detail" class="output">Select an artifact.</div></div></section></div></main><footer class="footer"><div class="container"><a href="../index.html">Back to portfolio</a></div></footer>
<script>
const artifacts=[
{id:'HC-001',title:'Harness Card Failure Taxonomy',type:'Prompt system',status:'Working proof',boundary:'Public job-facing framework. No private user data required.',relationships:['AI Response Triage','Prompt Repair Card'],proves:'LLM evaluation, failure labeling, prompt repair, response QA.'},
{id:'TWIS-002',title:'Twis Holo Workshop Deployment Note',type:'Deployment / setup',status:'Live proof',boundary:'Cloudflare is remote field kit only. Private files and source authority remain local.',relationships:['Cloudflare Pages','Workers AI endpoint','Browser voice loop'],proves:'Static deployment, remote access, local-first architecture, documentation.'},
{id:'THY-003',title:'Thousand-Year Hangover Source Boundary',type:'Creative workflow',status:'Case study',boundary:'Lived source, human review, canon decision, and creative output remain separated.',relationships:['Visual prompts','Music concepts','Narration planning'],proves:'Creative AI operations, continuity control, source-governed writing.'},
{id:'AC-004',title:'Artifact Compass Lite Registry',type:'Local JSON registry',status:'Demo',boundary:'Sample artifacts only. No cloud database, account, or private corpus needed.',relationships:['projects.json','artifacts.json','detail view'],proves:'Artifact organization, provenance, source relationships, workflow design.'},
{id:'JOB-005',title:'Remote AI Job Targeting Packet',type:'Application artifact',status:'Ready to customize',boundary:'Job-facing wording only. Avoids fake ML engineer claims.',relationships:['Resume','Portfolio page','Application blurbs'],proves:'Career translation, documentation, practical positioning.'}
];
function renderList(){const q=document.getElementById('filter').value.toLowerCase();const list=document.getElementById('list');list.innerHTML='';artifacts.filter(a=>Object.values(a).join(' ').toLowerCase().includes(q)).forEach(a=>{const b=document.createElement('button');b.className='artifact-button';b.innerHTML=`<strong>${a.title}</strong><br><span class="small">${a.type} · ${a.status}</span>`;b.onclick=()=>show(a);list.appendChild(b)});}
function show(a){document.getElementById('detail').textContent=`${a.title}\n\nID: ${a.id}\nType: ${a.type}\nStatus: ${a.status}\n\nSource boundary:\n${a.boundary}\n\nRelationships:\n- ${a.relationships.join('\n- ')}\n\nWhat this proves:\n${a.proves}\n\nHuman review rule:\nAI may assist with organization and drafting. Human review controls source status, canon decisions, and public claims.`}
renderList();show(artifacts[0]);
</script></body></html>
